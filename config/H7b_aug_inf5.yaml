# H7b_aug_inf5 — Mejor resultado reproducible hasta la fecha
# Reproducible: seeds completas (random, numpy, torch, cuda.manual_seed_all) + PYTHONHASHSEED=42
id: H7b_aug
tag: H7b_aug_inf5
date: 2026-07-13
git_commit: current

config:
  backbones: small  # 34K DeepConvNet + 38K ShallowConvNet
  backbone_dropout: 0.7
  backbone_wd: 0.005
  backbone_epochs: 200
  backbone_patience: 30
  hidden: 64
  n_heads: 1
  n_self_attn_layers: 1
  dropout: 0.7
  max_windows: 200
  fusion_epochs: 200
  fusion_patience: 30
  fusion_scheduler: cosine
  inner_folds: 5
  lr_fusion: 0.0005
  wd_fusion: 0.001
  augment: true
  augment_backbone: false
  mixup_alpha: 0.0
  bottleneck_dim: null
  feat_dropout: 0.0
  adapter_dim: null
  window_aux: false

results:
  test_bacc: 0.785
  test_bacc_std: 0.086
  test_auc: 0.881
  test_auc_std: 0.092
  inner_cv_val: 0.725
  inner_cv_val_std: 0.029
  folds_bacc: [0.875, 0.633, 0.833, 0.833, 0.750]

analysis: >
  Best reproducible result (0.785±0.086). AUC=0.881±0.092 beats H7b (0.787±0.133).
  100% reproducible with full seeds. Fold 2 weakest (0.633) — with ~30 train + 8 test subjects,
  a couple misclassifications on minority class swings bacc heavily.
  Fusion head reaches train_bacc=1.0 by ~20 epochs, then trains 180 more with cosine LR — likely memorizes.
  Next step: mixup during fusion training to regularize.
