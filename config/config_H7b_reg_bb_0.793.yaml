# H7b — Best cross-modal model (strict nested CV)
# Cross-Attention single-head, backbones regularized (dropout 0.7, wd 5e-3)
# BACC = 0.793 ± 0.037  |  AUC = 0.787 ± 0.133
# 5-fold StratifiedGroupKFold (subject-level, 0-leakage), 5 inner fusion folds
# Key improvement: variance reduced from 0.133 (H4a) to 0.037
# All 5 folds >= 0.750 (Fold 5 rescued from 0.500 to 0.750)
# Commit: 5d177a2
# Date: 2026-07-12
# Script: train_crossmodal_sngkf.py

# ── Data ──
eeg_cache: data/processed/eeg_preprocessed_64ch.npz
audio_cache: data/processed/audio_mel_cache.npz
mapping_path: data/processed/multimodal_mapping.json
max_windows: 200

# ── Architecture ──
fusion: cross_attn                     # Bidirectional cross-modal attention
hidden: 64                             # Hidden dimension after projection
n_heads: 1                             # Single-head cross-attention
bottleneck_dim: null                   # No bottleneck (full 128/576 dim projection)
dropout: 0.7                           # Classifier dropout
n_self_attn_layers: 1                  # One self-attention block after fusion
self_attn_heads: 4                     # Self-attention heads
self_attn_dropout: 0.1                 # Self-attention dropout
pooling: mean                          # Mean pooling over windows (masked)

# ── Backbone (frozen during fusion training) ──
backbone_eeg: DeepConvNet              # 34,361 params — 64ch x 500 samples
backbone_aud: ShallowConvNet           # 37,849 params — 64 mel x 200 frames
backbone_dropout: 0.7                  # Internal dropout (DeepConvNet/ShallowConvNet)
backbone_lr: 0.0005
backbone_wd: 0.005                     # Increased from 0.001 (H7b change)
backbone_epochs: 200                   # Increased from 100
backbone_patience: 30                  # Increased from 15
inner_cv_backbone: 5                   # StratifiedGroupKFold splits for backbone

# ── Fusion head ──
fusion_lr: 0.0005
fusion_wd: 0.001
fusion_epochs: 200
fusion_patience: 30
fusion_scheduler: cosine               # CosineAnnealingLR with T_max=200
batch_size: 8
inner_cv_fusion: 5                     # StratifiedGroupKFold splits
pos_weight: dynamic                    # n_HC / n_MDD per fold for balanced BCE
label_smoothing: true                  # y * 0.95 + 0.025

# ── Regularization ──
augment: false
augment_backbone: false
adapter_dim: null
window_aux: false
window_aux_weight: 0.3
mixup_alpha: 0.0
feat_dropout: 0.0                      # (H7b: reverted from 0.2 back to 0.0)

# ── Joint fine-tune ──
joint_ft: false

# ── Reproducibility ──
seed: 42
cv_type: StratifiedGroupKFold
n_folds: 5
loocv: false

# ── Exact reproduction command ──
command: |
  py src/training/train_crossmodal_sngkf.py ^
    --fusion cross_attn ^
    --hidden 64 ^
    --n-heads 1 ^
    --dropout 0.7 ^
    --max-windows 200 ^
    --epochs 200 ^
    --patience 30 ^
    --fusion-epochs 200 ^
    --fusion-patience 30 ^
    --lr-fusion 5e-4 ^
    --wd-fusion 1e-3 ^
    --wd 5e-3 ^
    --feat-dropout 0.0

# ── Per-fold results ──
results:
  fold_1:
    test_bacc: 0.750
    test_auc: 0.812
    backbone_eeg_best: 0.648
    backbone_aud_best: 0.540
    inner_cv_val: 0.742
    n_test: 8
  fold_2:
    test_bacc: 0.800
    test_auc: 0.667
    backbone_eeg_best: 0.680
    backbone_aud_best: 0.678
    inner_cv_val: 0.683
    n_test: 8
  fold_3:
    test_bacc: 0.833
    test_auc: 1.000
    backbone_eeg_best: 0.768
    backbone_aud_best: 0.614
    inner_cv_val: 0.758
    n_test: 7
  fold_4:
    test_bacc: 0.833
    test_auc: 0.833
    backbone_eeg_best: 0.647
    backbone_aud_best: 0.694
    inner_cv_val: 0.692
    n_test: 7
  fold_5:
    test_bacc: 0.750
    test_auc: 0.625
    backbone_eeg_best: 0.578
    backbone_aud_best: 0.598
    inner_cv_val: 0.675
    n_test: 8
  summary:
    bacc_mean: 0.793
    bacc_std: 0.037
    auc_mean: 0.787
    auc_std: 0.133
    val_bacc_mean: 0.710
    val_bacc_std: 0.034

# ── Key improvements over H4a (0.743 ± 0.133) ──
improvements:
  - "Variance reduced from ±0.133 (H4a) to ±0.037 — 3.6× more consistent across folds"
  - "Fold 5 rescued: 0.500 → 0.750 (critical win on the worst-case fold)"
  - "All 5 folds now ≥0.750 (none below 0.708 as in prior experiments)"
  - "Mean BACC improved from 0.743 to 0.793 (+0.05)"
  - "Backbone regularization (dropout 0.7, wd 5e-3) reduced overfitting gap"
  - "Cosine annealing scheduler stabilizes fusion training"
  - "Single-head cross-attention sufficient — 2 heads not needed"
