# Best cross-modal model — Experiment E (v0.1-strict-pipeline)
# Cross-Attention without bottleneck, dropout=0.7, inner fusion 5-fold
# BACC = 0.788 ± 0.072  |  AUC = 0.786 ± 0.115
# 5-fold StratifiedGroupKFold (subject-level, 0-leakage)
# Commit: c25f583
# Date: 2026-07-09

# ── Data ──
eeg_cache: data/processed/eeg_preprocessed_64ch.npz
audio_cache: data/processed/audio_mel_cache.npz
mapping_path: data/processed/multimodal_mapping.json
max_windows: 200

# ── Architecture ──
fusion: cross_attn                     # Bidirectional cross-modal attention
hidden: 64                             # Hidden dimension of fusion head
n_heads: 2                             # Cross-attention heads
bottleneck_dim: null                   # No bottleneck (full 128/576 dim projection)
dropout: 0.7                           # Classifier dropout (increased from 0.5)
n_self_attn_layers: 1                  # One self-attention block after fusion
self_attn_heads: 4                     # Self-attention heads
self_attn_dropout: 0.1                 # Self-attention dropout
pooling: mean                          # Mean pooling over windows (masked)

# ── Backbone (frozen during fusion training) ──
backbone_eeg: DeepConvNet              # 34,361 params — 64ch x 500 samples
backbone_aud: ShallowConvNet           # 37,849 params — 64 mel x 200 frames
backbone_lr: 0.0005
backbone_wd: 0.001
backbone_epochs: 100
backbone_patience: 15                  # Early stopping patience (inner 5-fold CV)
inner_cv_backbone: 5                   # StratifiedGroupKFold splits for backbone

# ── Fusion head ──
fusion_lr: 0.0005
fusion_wd: 0.001
fusion_epochs: 100
fusion_patience: 15
batch_size: 8
inner_cv_fusion: 5                     # StratifiedGroupKFold splits (changed from 3→5)
pos_weight: dynamic                    # n_HC / n_MDD per fold for balanced BCE
label_smoothing: true                  # y * 0.95 + 0.025

# ── Regularization (all disabled) ──
augment: false
adapter_dim: null
window_aux: false
window_aux_weight: 0.3
mixup_alpha: 0.0
feat_dropout: 0.0

# ── Joint fine-tune ──
joint_ft: false                        # Not used in this experiment

# ── Reproducibility ──
seed: 42
cv_type: StratifiedGroupKFold
n_folds: 5
loocv: false

# ── Exact reproduction command ──
command: |
  py src/training/train_crossmodal_strict.py ^
    --fusion cross_attn ^
    --hidden 64 ^
    --n-heads 2 ^
    --dropout 0.7 ^
    --max-windows 200 ^
    --epochs 100 ^
    --patience 15 ^
    --fusion-epochs 100 ^
    --fusion-patience 15 ^
    --lr-fusion 5e-4 ^
    --wd-fusion 1e-3

# ── Per-fold results ──
results:
  fold_1:
    test_bacc: 0.875
    test_auc: 0.812
    backbone_eeg_best: 0.650
    backbone_aud_best: 0.583
    fusion_val_bacc: 0.833
    n_test: 8
    test_subject_ids: "see results.json"
  fold_2:
    test_bacc: 0.733
    test_auc: 0.867
    backbone_eeg_best: 0.699
    backbone_aud_best: 0.674
    fusion_val_bacc: 1.000
    n_test: 8
  fold_3:
    test_bacc: 0.875
    test_auc: 0.917
    backbone_eeg_best: 0.803
    backbone_aud_best: 0.623
    fusion_val_bacc: 1.000
    n_test: 7
  fold_4:
    test_bacc: 0.708
    test_auc: 0.583
    backbone_eeg_best: 0.650
    backbone_aud_best: 0.717
    fusion_val_bacc: 0.833
    n_test: 7
  fold_5:
    test_bacc: 0.750
    test_auc: 0.750
    backbone_eeg_best: 0.528
    backbone_aud_best: 0.628
    fusion_val_bacc: 1.000
    n_test: 8
  summary:
    bacc_mean: 0.788
    bacc_std: 0.072
    auc_mean: 0.786
    auc_std: 0.115
    val_bacc_mean: 0.933
    val_bacc_std: 0.082

# ── Key improvements over previous best (D: 0.713) ──
improvements:
  - "Inner fusion CV changed from 3-fold to 5-fold — more reliable early stopping"
  - "Bottleneck removed — full 128/576 dim projection, +32% fusion parameters"
  - "Fold 4 (worst case) improved from 0.583 to 0.708"
  - "Standard deviation reduced from 0.110 to 0.072"
  - "All 5 folds now above 0.70 test BACC"