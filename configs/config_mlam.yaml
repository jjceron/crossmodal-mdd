# MLAM — Multimodal Latent Alignment Module
# Config v1 — immutable for first experiment round

# Data
eeg_cache: data/processed/eeg_preprocessed_64ch.npz
audio_cache: data/processed/audio_mel_cache.npz
mapping_path: data/processed/multimodal_mapping.json
max_windows: 50

# Architecture
eeg_encoder: deepconvnet        # DeepConvNet (from src.models.deepconvnet)
audio_encoder: shallowconvnet   # ShallowConvNet (from src.models.shallowconvnet)
proj_dim: 128                   # Shared latent dimension D

# Training — MLAM pretrain
batch_size: 8                   # NT-Xent negatives: must be > 1
lr: 0.0005
wd: 0.001
epochs: 200
patience: 30                    # early stopping on retrieval Top-1 val
optimizer: adamw
scheduler: reduce_on_plateau    # ReduceLROnPlateau(factor=0.5, patience=5)
grad_clip: 1.0

# Loss
lambda_cls: 0.1                 # weight for classification aux loss
logit_scale_init: 0.07          # initial temperature τ

# Evaluation gates (Fase 1.5)
linear_probe_min_bacc: 0.665    # baseline 0.685 - 2%
retrieval_min_top1: 0.50        # minimum retrieval Top-1 to pass gate

# Reproducibility
seed: 42  
